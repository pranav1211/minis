<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minis Editor</title>
    <link rel="icon" type="image/x-icon" href="https://beyondmebtw.com/assets/images/minis.ico">
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="editor.css">
</head>
<body>
    <div class="app">

        <!-- Header -->
        <header class="app-header">
            <div class="app-title">Minis Dashboard</div>
            <div class="app-header-actions">
                <a href="https://minis.beyondmebtw.com" target="_blank" class="view-site-btn">
                    <i class="fas fa-arrow-up-right-from-square"></i> view site
                </a>
                <a href="https://minis.beyondmebtw.com/private" target="_blank" class="view-site-btn private-editor-btn">
                    <i class="fas fa-lock"></i> private editor
                </a>
                <button id="logout-btn" class="logout-btn">logout</button>
            </div>
        </header>

        <!-- Tabs -->
        <div class="app-tabs">
            <button class="tab-btn active" data-tab="create">new mini</button>
            <button class="tab-btn" data-tab="edit">edit mini</button>
        </div>

        <!-- ── CREATE TAB ── -->
        <div id="tab-create" class="tab-content active">
            <div class="create-layout">
                <div class="create-title-row">
                    <input type="text" id="create-title" placeholder="Title" autocomplete="off" required>
                    <select id="create-visibility" class="visibility-select" title="visibility">
                        <option value="public" selected>public</option>
                        <option value="private">private (unlisted)</option>
                    </select>
                    <div class="tags-inline">
                        <div class="tag-input-wrapper" id="create-tag-wrapper">
                            <div class="tag-pills-row" id="create-pills"></div>
                            <input type="text" class="tag-text-input" id="create-tag-text" placeholder="tags…" autocomplete="off">
                            <button type="button" class="clear-tags-btn" id="create-clear-tags" style="display:none" title="clear all">×</button>
                        </div>
                        <div class="tag-suggestions-panel" id="create-tag-suggestions" style="display:none"></div>
                    </div>
                </div>
                <div class="editor-wrap">
                    <div id="create-editor"></div>
                </div>
                <div class="create-actions">
                    <button type="button" id="create-submit-btn" class="submit-btn">publish mini</button>
                    <div id="create-status" class="status-message" style="display:none;"></div>
                </div>
            </div>
        </div>

        <!-- ── EDIT TAB ── -->
        <div id="tab-edit" class="tab-content">
            <div class="edit-layout">

                <!-- Left: Post List -->
                <aside class="edit-sidebar">
                    <div class="edit-sidebar-header">
                        <input type="text" id="edit-search" placeholder="search posts…" autocomplete="off">
                        <div class="edit-sidebar-count" id="edit-post-count"></div>
                    </div>
                    <div id="post-list" class="post-list"></div>
                </aside>

                <!-- Right: Editor -->
                <div class="edit-main">
                    <div class="edit-empty-state" id="edit-empty-state">
                        <i class="fas fa-arrow-left"></i>
                        <span>select a mini to edit</span>
                    </div>

                    <form id="editForm" style="display:none;">
                        <div class="edit-title-row">
                            <input type="text" id="edit-id" readonly class="edit-id-input" title="Post ID">
                            <input type="text" id="edit-title" placeholder="Title" required class="edit-title-input">
                            <div class="tags-inline">
                                <div class="tag-input-wrapper" id="edit-tag-wrapper">
                                    <div class="tag-pills-row" id="edit-pills"></div>
                                    <input type="text" class="tag-text-input" id="edit-tag-text" placeholder="tags…" autocomplete="off">
                                    <button type="button" class="clear-tags-btn" id="edit-clear-tags" style="display:none" title="clear all">×</button>
                                </div>
                                <div class="tag-suggestions-panel" id="edit-tag-suggestions" style="display:none"></div>
                            </div>
                        </div>
                        <div class="editor-wrap">
                            <div id="edit-editor"></div>
                        </div>
                        <div class="edit-actions">
                            <button type="submit" class="submit-btn">update mini</button>
                            <button type="button" id="delete-btn" class="danger-btn">delete</button>
                            <div id="edit-status" class="status-message" style="display:none;"></div>
                        </div>
                    </form>
                </div>

            </div>
        </div>

    </div>

    <!-- Private share-link modal (shown after creating a private mini) -->
    <div id="private-share-modal" class="share-modal" style="display:none;">
        <div class="share-modal-inner">
            <h3>private mini created</h3>
            <p>save this link. it contains the access token — only people with the full link can read this mini. you can also find it later at <a href="/private" target="_blank" rel="noopener">/private</a>.</p>
            <div class="share-modal-link-row">
                <input type="text" id="private-share-link" readonly>
                <button type="button" id="private-share-copy">copy</button>
            </div>
            <div class="share-modal-actions">
                <button type="button" id="private-share-open">open in new tab</button>
                <button type="button" id="private-share-close">close</button>
            </div>
        </div>
    </div>

    <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
    <script src="editor.js"></script>
</body>
</html>
